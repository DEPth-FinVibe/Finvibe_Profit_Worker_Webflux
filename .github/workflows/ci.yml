name: CI - Build & Deploy (WebFlux)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: cmh1448/finvibe-profit-worker-webflux
  MANIFEST_REPOSITORY: DEPth-FinVibe/Finvibe_Backend_Manifest
  MANIFEST_PATH: profit-worker-webflux

concurrency:
  group: profit-worker-webflux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Docker login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Checkout manifest repo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPOSITORY }}
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifest

      - name: Update image tag in manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${IMAGE_TAG}|" "manifest/${MANIFEST_PATH}/deployment.yaml"

      - name: Commit & Push manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd manifest
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${MANIFEST_PATH}"
          git commit -m "deploy(profit-worker-webflux): ${IMAGE_TAG}" || exit 0
          git push
