spring:
  application:
    name: profit-worker-webflux

  main:
    web-application-type: reactive

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: profit-worker
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    depth.finvibe.profit.worker: INFO

app:
  metrics:
    worker-runtime: ${APP_METRICS_WORKER_RUNTIME:webflux}
  profit:
    recalculation:
      parallelism: ${PROFIT_RECALCULATION_PARALLELISM:4}
      queue-capacity: ${PROFIT_RECALCULATION_QUEUE_CAPACITY:256}
  kafka:
    topics:
      stock-price-updated: ${KAFKA_TOPIC_STOCK_PRICE_UPDATED:market.stock-price-updated.v1}
      portfolio-trade: ${KAFKA_TOPIC_PORTFOLIO_TRADE:trade.trade-executed.v1}
      portfolio-user: ${KAFKA_TOPIC_PORTFOLIO_USER:asset.portfolio-group-changed.v1}
